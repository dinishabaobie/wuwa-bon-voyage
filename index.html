<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鸣潮 · 拉海洛篇章 | Ver 3.0 – 3.4</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,0 57,43 100,50 57,57 50,100 43,57 0,50 43,43' fill='%238b9aff'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- 开场加载层 -->
  <div id="loader">
    <div class="loader-star" aria-hidden="true"></div>
    <h1 class="loader-title">鸣潮 · 拉海洛篇章</h1>
    <p class="loader-sub">VER 3.0 — 3.4 · A RETROSPECTIVE</p>
    <p class="loader-enter">点 击 进 入</p>
  </div>

  <!-- Three.js 光标拖痕背景 -->
  <canvas id="trail-canvas"></canvas>

  <!-- 噪点颗粒层 -->
  <div class="grain" aria-hidden="true"></div>

  <!-- 自定义四芒星光标 -->
  <div id="cursor" aria-hidden="true"></div>

  <!-- 版本时间轴导航 -->
  <nav id="timeline" aria-label="版本导航"></nav>

  <!-- BGM 开关 -->
  <button id="bgm-toggle" aria-label="音乐开关">
    <span class="bgm-bars"><i></i><i></i><i></i><i></i></span>
    <span class="bgm-label">音乐 关</span>
  </button>

  <main id="app"></main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
