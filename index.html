<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>泰提斯终端 | Ver 3.0 – 3.4</title>
  <link rel="icon" type="image/png" href="./black-shores-flower.png" />
</head>
<body>
  <!-- 开场加载层 -->
  <div id="loader">
    <div class="loader-star" aria-hidden="true"></div>
    <h1 class="loader-title">泰提斯终端</h1>
    <div class="loader-state" aria-live="polite">
      <p class="loader-status">核验访问者身份<span class="loader-dots" aria-hidden="true"><i>.</i><i>.</i><i>.</i></span></p>
      <p class="loader-confirm">已确认</p>
    </div>
  </div>

  <!-- Three.js 光标拖痕背景 -->
  <canvas id="trail-canvas"></canvas>

  <!-- 噪点颗粒层 -->
  <div class="grain" aria-hidden="true"></div>

  <!-- 自定义四芒星光标 -->
  <div id="cursor" aria-hidden="true"></div>

  <!-- 版本时间轴导航 -->
  <nav id="timeline" aria-label="版本导航"></nav>

  <!-- BGM 开关 -->
  <button id="bgm-toggle" aria-label="音乐开关">
    <span class="bgm-bars"><i></i><i></i><i></i><i></i></span>
    <span class="bgm-label">音乐 关</span>
  </button>

  <main id="app"></main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
